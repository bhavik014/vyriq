<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Vyriq.ai — Social Content Intelligence, Powered by Your AI{% endblock %}</title>
  <meta name="description" content="{% block description %}Vyriq uses AI you control to analyze every post you publish — scoring hooks, finding patterns, and telling you exactly how to grow faster.{% endblock %}" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="noise-overlay"></div>

  <!-- Flash messages (errors, success) -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-bar">
        {% for category, message in messages %}
          <div class="flash flash--{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block body %}{% endblock %}

  {% block extra_js %}{% endblock %}
</body>
</html>
