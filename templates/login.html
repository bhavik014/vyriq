{% extends "base.html" %}
{% block title %}Authentication — Vyriq Intelligence{% endblock %}

{% block body %}
<div style="min-height: 100vh; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 40px;">
  <div style="width: 100%; max-width: 440px;">
    
    <div style="text-align: center; margin-bottom: 48px;">
      <a href="{{ url_for('index') }}" class="logo-wrap" style="justify-content: center; margin-bottom: 32px;">
        <div class="logo-v" style="width: 44px; height: 44px; font-size: 1.6rem;">V</div>
        <div class="logo-text" style="font-size: 2rem;">Vyriq</div>
      </a>
      <h1 style="font-size: 2.2rem; margin-bottom: 12px;">Sign in to Portal</h1>
      <p style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: 700;">Enter your private credentials</p>
    </div>

    <div class="mock-metric-card" style="padding: 40px;">
      <form method="POST" action="{{ url_for('login') }}">
        <div style="margin-bottom: 24px;">
          <label style="display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 10px;">Email Address</label>
          <input type="email" name="email" style="width: 100%; background: #000; border: 1px solid var(--line); padding: 16px; color: #fff; border-radius: 4px; outline: none;" placeholder="name@company.com" required />
        </div>
        <div style="margin-bottom: 32px;">
          <label style="display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 10px;">Security Password</label>
          <input type="password" name="password" style="width: 100%; background: #000; border: 1px solid var(--line); padding: 16px; color: #fff; border-radius: 4px; outline: none;" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-gold" style="width: 100%; justify-content: center; padding: 18px; border-radius: 4px;">INITIALIZE ACCESS →</button>
      </form>
      
      <div style="margin-top: 32px; text-align: center;">
        <p style="font-size: 0.85rem; color: var(--text-muted);">
          Institutional access lost? <a href="#" style="color: var(--gold); text-decoration: none;">Contact Admin</a>
        </p>
      </div>
    </div>

    <div style="margin-top: 32px; text-align: center;">
      <p style="color: var(--text-muted); font-size: 0.9rem;">
        New to the intelligence? <a href="{{ url_for('signup') }}" style="color: #fff; text-decoration: none; font-weight: 600;">Establish Account</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
