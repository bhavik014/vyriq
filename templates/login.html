{% extends "base.html" %}
{% block title %}Sign In — Vyriq{% endblock %}

{% block body %}
<div class="glow-bg"></div>
<div class="auth-page">
  <a href="{{ url_for('index') }}" class="dash-logo">
    <span class="logo-mark">V</span> Vyriq
  </a>

  <div class="glass-card auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Enter your credentials to access your intel.</p>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="name@company.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn--glow" style="width:100%; justify-content:center; margin-top: 10px;">
        Sign in →
      </button>
    </form>

    <p class="auth-footer">
      New to Vyriq? <a href="{{ url_for('signup') }}">Create free account</a>
    </p>
  </div>
</div>
{% endblock %}
