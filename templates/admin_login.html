<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin Login — Vyriq.ai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}"/>
</head>
<body>
<div style="min-height:100vh;background:var(--obsidian);display:flex;align-items:center;justify-content:center;padding:40px 24px">
  <div style="background:var(--obsidian-2);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:0 32px 80px rgba(0,0,0,.5)">

    <div style="text-align:center;margin-bottom:32px">
      <div class="logo-mark" style="margin:0 auto 12px">V</div>
      <div style="font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)">Admin Access</div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="flash flash--{{ cat }}" style="margin-bottom:16px">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label>Admin Password</label>
        <input type="password" name="password" placeholder="Enter admin password" autofocus required/>
      </div>
      <button type="submit" class="btn btn--gold" style="width:100%;justify-content:center;margin-top:20px">
        Enter Admin Panel →
      </button>
    </form>

    <p style="margin-top:20px;text-align:center;font-size:.75rem;color:rgba(255,255,255,.2)">
      <a href="{{ url_for('index') }}" style="color:rgba(255,255,255,.3)">← Back to site</a>
    </p>
  </div>
</div>
</body>
</html>
